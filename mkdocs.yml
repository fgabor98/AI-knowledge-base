site_name: Tech Knowledge Base
site_description: Programming, Linux, and embedded systems know-how.
repo_name: knowhow
theme:
  name: readthedocs
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - content.code.copy
    - search.suggest
    - search.highlight
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
nav:
  - Home: index.md
  - Topic Map: topic-map.md
  - C:
      - c/index.md
  - Bash:
      - Overview: bash/index.md
      - Beginner:
          - When To Use Bash: bash/when-to-use-bash.md
          - Interactive Shell Usage: bash/interactive-shell-usage.md
          - Execution Model: bash/execution-model.md
          - Shell Builtins And Command Lookup: bash/shell-builtins-and-command-lookup.md
          - Quoting: bash/quoting.md
          - Variables And Expansion: bash/variables-and-expansion.md
          - Word Splitting And IFS: bash/word-splitting-and-ifs.md
          - Globbing And Shell Options: bash/globbing-and-shell-options.md
          - Exit Codes: bash/exit-codes.md
          - Conditionals: bash/conditionals.md
          - Loops: bash/loops.md
          - Functions: bash/functions.md
          - Robust Scripts: bash/robust-scripts.md
          - Bash Vs POSIX Sh: bash/bash-vs-posix-sh.md
      - Intermediate:
