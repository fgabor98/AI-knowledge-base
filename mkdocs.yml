          - Here Documents And Here Strings: bash/here-documents-and-here-strings.md
          - Command And Process Substitution: bash/command-and-process-substitution.md
          - Subshells: bash/subshells.md
          - Read Lines Safely: bash/read-lines-safely.md
          - Read Builtin: bash/read-builtin.md
          - Argument Parsing: bash/argument-parsing.md
          - Standard Unix Tools: bash/standard-unix-tools.md
          - Logging: bash/logging.md
          - Traps And Cleanup: bash/traps-and-cleanup.md
